<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes radarPulse{
      0%{opacity:1}
      50%{opacity:.35}
      100%{opacity:1}
    }
    .radar{
      animation:radarPulse 1.6s infinite ease-in-out;
    }
  </style>

  <defs>
    <mask id="cutout">
      <rect width="512" height="512" fill="white"/>

      <!-- PLAY transparent -->
      <path fill="black" d="M224 233.052 297.578 184 224 134.948z"/>

      <!-- LIVE transparent -->
      <path fill="black" d="M192 432h-48a8 8 0 0 1-8-8v-64a8 8 0 0 1 16 0v56h40a8 8 0 0 1 0 16"/>
      <path fill="black" d="M224 424a8 8 0 0 1-16 0v-64a8 8 0 0 1 16 0z"/>
      <path fill="black" d="M303.491 362.809 279.491 426.809a8 8 0 0 1-14.982 0l-24-64a8 8 0 0 1 14.982-5.618L272 401.216l16.509-44.025a8.001 8.001 0 0 1 14.982 5.618"/>
      <path fill="black" d="M368 384a8 8 0 0 1 0 16h-40v16h40a8 8 0 0 1 0 16h-48a8 8 0 0 1-8-8v-64a8 8 0 0 1 8-8h48a8 8 0 0 1 0 16h-40v16z"/>
    </mask>
  </defs>

  <!-- BODY -->
  <g fill="#fff" mask="url(#cutout)">
    <circle cx="256" cy="184" r="96"/>
    <rect x="112" y="336" width="288" height="112" rx="32"/>
  </g>

  <!-- RADAR WAVES -->
  <g class="radar" fill="#fff">
    <path d="M378 246c18-17 30-39 30-62s-12-45-30-62"/>
    <path d="M408 280c30-27 48-60 48-96s-18-69-48-96"/>
    <path d="M134 246c-18-17-30-39-30-62s12-45 30-62"/>
    <path d="M104 280c-30-27-48-60-48-96s18-69 48-96"/>
  </g>
</svg>
